name: Daily Docs Sync Job

on:
  schedule:
    # Triggers execution once every single day at midnight (00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual trigger button for tester evaluation

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository layout code
        uses: actions/checkout@v4

      - name: Setup environment workspace runtime Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install localized dependencies components
        run: |
          pip install requests markdownify openai python-dotenv httpx==0.27.2

      - name: Run Delta Scraper Pipeline Engine
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python main.py